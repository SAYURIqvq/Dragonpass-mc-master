kind: Deployment
apiVersion: apps/v1
metadata:
  name: mc-api
  namespace: platform-ai
spec:
  replicas: $appReplicas
  selector:
    matchLabels:
      app: mc-api
  template:
    metadata:
      labels:
        app: mc-api
    spec:
      volumes:
        - name: v-local-time
          hostPath:
            path: /etc/localtime
      containers:
        - name: mc-api
          image: "$image"
          command:
            - "python"
          args:
            - "main.py"
          env:
            - name: TZ
              value: "Asia/Shanghai"
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
          ports:
            - name: p1-8000
              containerPort: 8000
              protocol: TCP
          resources:
            limits:
              cpu: '4'
              memory: 4096Mi
            requests:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: v-local-time
              mountPath: /etc/localtime

          livenessProbe:
            tcpSocket:
              port: 8000
            timeoutSeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 2
          readinessProbe:
            tcpSocket:
              port: 8000
            timeoutSeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command:
                  - sleep
                  - '65'
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: "role"
          operator: "Equal"
          value: "nvidia-gpu"
          effect: "NoSchedule"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  minReadySeconds: 30
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600

---

kind: Service
apiVersion: v1
metadata:
  name: mc-api
  namespace: platform-ai
spec:
  ports:
    - name: l-80
      protocol: TCP
      port: 80
      targetPort: 8000
  selector:
    app: mc-api
  type: ClusterIP
  sessionAffinity: None

